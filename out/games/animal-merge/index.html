<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>동물 합치기 — NEON</title>
<style>
  :root{ --bg:#06060d; --neon:#00e5ff; --neon2:#ff2d95; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--bg); overflow:hidden;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; color:#eaf6ff; }
  #c{ display:block; touch-action:none; }
  /* 게임오버 오버레이 */
  #over{ position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(4,4,12,.72); backdrop-filter:blur(6px); z-index:5; }
  #over.show{ display:flex; }
  .panel{ width:min(86vw,360px); text-align:center; padding:30px 24px;
    border:1.5px solid rgba(0,229,255,.55); border-radius:22px; background:rgba(10,12,22,.9);
    box-shadow:0 0 40px rgba(0,229,255,.25), inset 0 0 30px rgba(0,229,255,.06); }
  .panel h2{ margin:0 0 4px; font-size:13px; letter-spacing:4px; color:#7fdfff; font-weight:800; }
  .panel .sc{ font-size:54px; font-weight:900; line-height:1.05; margin:6px 0 2px;
    color:#fff; text-shadow:0 0 18px var(--neon),0 0 36px rgba(0,229,255,.6); font-variant-numeric:tabular-nums; }
  .panel .best{ font-size:12px; color:#8aa7c0; margin-bottom:22px; }
  .btn{ display:block; width:100%; margin:9px 0; padding:14px; border-radius:14px; cursor:pointer;
    font-size:15px; font-weight:800; letter-spacing:1px; border:1.5px solid; background:transparent; }
  .btn.go{ color:#06060d; background:var(--neon); border-color:var(--neon); box-shadow:0 0 22px rgba(0,229,255,.5); }
  .btn.gh{ color:#ff8ec5; border-color:rgba(255,45,149,.6); box-shadow:0 0 18px rgba(255,45,149,.2); }
  #mute{ position:fixed; top:8px; right:8px; z-index:6; width:38px; height:38px; border-radius:50%;
    background:rgba(0,229,255,.08); border:1.5px solid rgba(0,229,255,.4); color:#bdefff; font-size:17px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 0 14px rgba(0,229,255,.22); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="mute" aria-label="음악 켜기/끄기">🔊</button>
<div id="over">
  <div class="panel">
    <h2>GAME OVER</h2>
    <div class="sc" id="fsc">0</div>
    <div class="best" id="fbest"></div>
    <button class="btn go" id="again">▶ 다시 하기</button>
    <button class="btn gh" id="rank">🏆 명예의 전당</button>
  </div>
</div>
<script src="matter.min.js"></script>
<script>
(function(){
  const { Engine, World, Bodies, Body, Composite, Events } = Matter;
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');

  // ── 동물 12단계 (작은→큰) + 네온 색 ──
  const ANIMALS = ['🐭','🐹','🐰','🐱','🦊','🐶','🐨','🐯','🦁','🐻','🐼','🐘'];
  const COLORS  = ['#00e5ff','#39ff14','#ff2d95','#ffd000','#b026ff','#ff6a00','#00ffc6','#ff3131','#19a7ff','#c8ff00','#ff00e6','#ffffff'];
  const FRAC    = [0.050,0.063,0.078,0.097,0.118,0.143,0.172,0.205,0.243,0.288,0.338,0.40]; // 반지름=jarW*frac
  const SCORE   = [0,1,3,6,10,15,21,28,36,45,55,66]; // tier 생성시 누적점수
  const MAXTIER = 12;
  const SPAWN_MAX = 5; // 떨어지는 동물은 1~5단계만

  let W,H,dpr, jarX,jarW,jarTop,jarBottom,jarH, danger;
  let engine, world, walls=[];
  let orbs=[];            // {body, tier}
  let particles=[];
  let current=null;       // 대기 중 동물 {tier}
  let nextTier=null;
  let dropX=0, canDrop=true, score=0, best=0, over=false, overT=0, started=false;
  const mergeQueue=[];

  try{ best = parseInt(localStorage.getItem('animalmerge_best')||'0',10)||0; }catch(e){}

  function layout(){
    W = window.innerWidth; H = window.innerHeight; dpr = Math.min(window.devicePixelRatio||1, 2.5);
    cv.width = W*dpr; cv.height = H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const hud = 86, footer = 66;
    jarW = Math.min(W-24, 460);
    jarH = Math.min(H-hud-footer, jarW*1.42);
    jarX = (W-jarW)/2;
    jarTop = hud;
    jarBottom = jarTop + jarH;
    danger = jarTop + Math.round(jarW*0.16);
    dropX = W/2;
  }
  function R(tier){ return jarW*FRAC[tier-1]; }
  function speed(b){ return Math.hypot(b.velocity.x,b.velocity.y); }

  function buildWalls(){
    for(const w of walls) World.remove(world,w);
    const t=80;
    walls=[
      Bodies.rectangle(jarX - t/2, jarTop+jarH/2, t, jarH+400, {isStatic:true}),
      Bodies.rectangle(jarX+jarW + t/2, jarTop+jarH/2, t, jarH+400, {isStatic:true}),
      Bodies.rectangle(jarX+jarW/2, jarBottom + t/2, jarW+400, t, {isStatic:true}),
    ];
    World.add(world, walls);
  }

  function addOrb(x,tier,y){
    const r=R(tier);
    const b=Bodies.circle(x, y==null? (jarTop - r - 2) : y, r, {
      restitution:0.15, friction:0.45, frictionStatic:0.6, density:0.0014, label:'orb',
    });
    b.tier=tier; b.merged=false; b.born=performance.now();
    World.add(world,b); orbs.push({body:b,tier});
    return b;
  }

  function pickTier(){ return 1 + Math.floor(Math.pow(Math.random(),1.35)*SPAWN_MAX); }
  function newCurrent(){
    current = { tier: (nextTier||pickTier()) };
    nextTier = pickTier();
    canDrop = true;
  }

  function drop(){
    if(!current || !canDrop || over) return;
    const r=R(current.tier);
    const x=Math.max(jarX+r+2, Math.min(jarX+jarW-r-2, dropX));
    addOrb(x, current.tier, jarTop - r - 2);
    current=null; canDrop=false;
    setTimeout(()=>{ if(!over) newCurrent(); }, 360);
  }

  function burst(x,y,color){
    for(let i=0;i<14;i++){ const a=Math.random()*6.28, s=1.5+Math.random()*4.5;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color}); }
  }

  Events && 0;
  function onCollision(e){
    for(const p of e.pairs){
      const a=p.bodyA, b=p.bodyB;
      if(a.label==='orb'&&b.label==='orb'&&a.tier===b.tier&&!a.merged&&!b.merged&&a.tier<MAXTIER){
        a.merged=b.merged=true; mergeQueue.push([a,b]);
      }
    }
  }
  function processMerges(){
    while(mergeQueue.length){
      const [a,b]=mergeQueue.pop();
      const nx=(a.position.x+b.position.x)/2, ny=(a.position.y+b.position.y)/2, t=a.tier+1;
      removeOrb(a); removeOrb(b);
      const nb=addOrb(nx,t,ny); Body.setVelocity(nb,{x:0,y:-1.5});
      score += SCORE[t]; burst(nx,ny,COLORS[t-1]); nb.pop=1;
      if(t===MAXTIER) burst(nx,ny,'#ffffff');
    }
  }
  function removeOrb(body){ World.remove(world,body); const i=orbs.findIndex(o=>o.body===body); if(i>=0) orbs.splice(i,1); }

  function checkOver(dt){
    if(!started) return;
    if(orbs.length>140){ gameOver(); return; } // 비정상 누적 안전장치
    let bad=false, spill=false;
    for(const o of orbs){ const b=o.body;
      if(b.position.y < jarTop-4) spill=true;   // 통 위로 넘침
      if(performance.now()-b.born<700) continue;
      if(b.position.y - b.circleRadius < danger && speed(b)<1.0){ bad=true; }
    }
    if(spill) overT += dt*3; else if(bad) overT += dt; else overT = 0;
    if(overT>1400) gameOver();
  }

  function gameOver(){
    if(over) return; over=true;
    if(score>best){ best=score; try{localStorage.setItem('animalmerge_best',String(best));}catch(e){} }
    document.getElementById('fsc').textContent = score.toLocaleString();
    document.getElementById('fbest').textContent = '최고 '+best.toLocaleString()+'점';
    document.getElementById('over').classList.add('show');
    try{ parent.postMessage({type:'dori-game',event:'gameover',score:score}, '*'); }catch(e){}
  }

  function reset(){
    for(const o of orbs) World.remove(world,o.body);
    orbs=[]; particles=[]; mergeQueue.length=0;
    score=0; over=false; overT=0; started=false;
    document.getElementById('over').classList.remove('show');
    nextTier=pickTier(); newCurrent();
  }

  // ── 렌더 ──
  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function drawOrb(x,y,r,tier,alpha){
    const color=COLORS[tier-1];
    ctx.save(); ctx.globalAlpha=alpha==null?1:alpha;
    // inner dark fill
    ctx.beginPath(); ctx.arc(x,y,r,0,6.2832);
    const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
    g.addColorStop(0,'rgba(20,24,40,.95)'); g.addColorStop(1,'rgba(8,9,18,.98)');
    ctx.fillStyle=g; ctx.fill();
    // neon ring
    ctx.shadowColor=color; ctx.shadowBlur=18; ctx.lineWidth=Math.max(2,r*0.13);
    ctx.strokeStyle=color; ctx.stroke();
    ctx.shadowBlur=0;
    // emoji
    ctx.globalAlpha=alpha==null?1:alpha;
    ctx.font=(r*1.15)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ANIMALS[tier-1], x, y+r*0.06);
    ctx.restore();
  }

  function neonText(txt,x,y,size,color,align){
    ctx.save(); ctx.font='800 '+size+'px "Segoe UI",sans-serif'; ctx.textAlign=align||'left'; ctx.textBaseline='alphabetic';
    ctx.shadowColor=color; ctx.shadowBlur=14; ctx.fillStyle='#fff'; ctx.fillText(txt,x,y);
    ctx.shadowBlur=0; ctx.fillStyle=color; ctx.globalAlpha=.0; ctx.restore();
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    // bg grid + vignette
    ctx.fillStyle='#06060d'; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.globalAlpha=.10; ctx.strokeStyle='#1ff'; ctx.lineWidth=1;
    for(let gx=jarX; gx<=jarX+jarW; gx+=Math.max(30,jarW/10)){ ctx.beginPath(); ctx.moveTo(gx,jarTop); ctx.lineTo(gx,jarBottom); ctx.stroke(); }
    ctx.restore();

    // 컨테이너 네온 프레임
    ctx.save(); ctx.shadowColor='#00e5ff'; ctx.shadowBlur=22; ctx.strokeStyle='rgba(0,229,255,.85)'; ctx.lineWidth=3;
    roundRect(jarX,jarTop,jarW,jarH,18); ctx.stroke(); ctx.restore();

    // 위험선
    ctx.save(); ctx.setLineDash([7,9]); ctx.strokeStyle='rgba(255,45,149,.55)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(jarX+8,danger); ctx.lineTo(jarX+jarW-8,danger); ctx.stroke(); ctx.restore();

    // orbs
    for(const o of orbs){ const b=o.body; let r=b.circleRadius;
      if(b.pop){ r*=1+0.18*b.pop; b.pop=Math.max(0,b.pop-0.08); }
      drawOrb(b.position.x,b.position.y,r,o.tier);
    }
    // particles
    for(const p of particles){ ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
      ctx.shadowColor=p.color; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(p.x,p.y,3*p.life+0.5,0,6.2832); ctx.fill(); ctx.restore(); }

    // 대기 동물 + 가이드라인
    if(current && !over){
      const r=R(current.tier); const x=Math.max(jarX+r+2,Math.min(jarX+jarW-r-2,dropX));
      ctx.save(); ctx.globalAlpha=.18; ctx.strokeStyle=COLORS[current.tier-1]; ctx.lineWidth=2; ctx.setLineDash([4,8]);
      ctx.beginPath(); ctx.moveTo(x,jarTop+r*2); ctx.lineTo(x,jarBottom); ctx.stroke(); ctx.restore();
      drawOrb(x, jarTop - r - 2, r, current.tier);
    }

    // HUD: 점수(좌) + 다음(우, 우상단 코너는 뮤트버튼 자리라 비움)
    neonText('SCORE', 22, 30, 12, '#7fdfff');
    neonText(score.toLocaleString(), 22, 64, 34, '#00e5ff');
    neonText('NEXT', W-118, 30, 12, '#ff8ec5', 'center');
    if(nextTier){ drawOrb(W-118, 54, 20, nextTier, .95); }
    ctx.save(); ctx.textAlign='center'; ctx.font='700 11px "Segoe UI"'; ctx.fillStyle='#5f7da0';
    ctx.fillText('BEST '+best.toLocaleString(), W/2, 24); ctx.restore();

    // 합치기(진화) 순서 — 하단에 12단계 미니 오브
    const N=ANIMALS.length;
    const gap=Math.min(Math.min(W-20, jarW+70)/N, 34), sz=gap*0.40;
    const sx=W/2 - gap*(N-1)/2, oy=jarBottom+38;
    ctx.save(); ctx.textAlign='center'; ctx.font='700 10px "Segoe UI"'; ctx.fillStyle='#6f93a8';
    ctx.fillText('합치기 순서', W/2, jarBottom+20); ctx.restore();
    for(let i=0;i<N;i++) drawOrb(sx+i*gap, oy, sz, i+1, .9);
  }

  // ── 루프 ──
  let last=performance.now();
  function loop(now){
    const dt=Math.min(40, now-last); last=now;
    if(!over){ Engine.update(engine, 1000/60); processMerges();
      for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03; } particles=particles.filter(p=>p.life>0);
      checkOver(dt);
    } else { for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03; } particles=particles.filter(p=>p.life>0); }
    render(); requestAnimationFrame(loop);
  }

  // ── BGM: Web Audio 신스웨이브 루프(외부 파일/저작권 없음) ──
  let actx=null, master=null, musicOn=true, nextNote=0, mstep=0;
  const CH=[[57,60,64,45],[53,57,60,41],[60,64,67,48],[55,59,62,43]]; // [코드3음, 베이스루트]
  const NSTEP=0.3;
  const hz=m=>440*Math.pow(2,(m-69)/12);
  function mvoice(freq,t,dur,type,vol,cut){
    const o=actx.createOscillator(), g=actx.createGain(); o.type=type; o.frequency.value=freq; let nd=o;
    if(cut){ const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=cut; o.connect(lp); nd=lp; }
    nd.connect(g); g.connect(master);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  }
  function msched(){
    if(!actx) return;
    while(nextNote < actx.currentTime+0.25){
      const ci=Math.floor(mstep/8)%4, ic=mstep%8, c=CH[ci];
      if(ic===0){ mvoice(hz(c[3]),nextNote,NSTEP*8,'sawtooth',0.10,420);            // 베이스
        c.slice(0,3).forEach(m=>mvoice(hz(m-12),nextNote,NSTEP*8,'sawtooth',0.02,700)); } // 패드
      mvoice(hz(c[ic%3]+12),nextNote,NSTEP*0.85,'triangle',0.055,3200);             // 아르페지오
      nextNote+=NSTEP; mstep++;
    }
  }
  function startMusic(){
    if(actx) return;
    try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master=actx.createGain(); master.gain.value=0; master.connect(actx.destination);
    master.gain.linearRampToValueAtTime(musicOn?0.18:0.0001, actx.currentTime+1.4);
    nextNote=actx.currentTime+0.15; mstep=0; setInterval(msched,50);
  }
  function toggleMute(){ musicOn=!musicOn; if(master) master.gain.linearRampToValueAtTime(musicOn?0.18:0.0001, actx.currentTime+0.25); }

  // ── 입력 ──
  function px(e){ return (e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX); }
  function onMove(e){ if(e.touches) e.preventDefault(); dropX=px(e); }
  function onDown(e){ if(e.touches) e.preventDefault(); dropX=px(e); started=true; if(!actx) startMusic(); }
  function onUp(e){ if(over) return; started=true; drop(); }
  cv.addEventListener('mousemove',onMove); cv.addEventListener('mousedown',onDown); cv.addEventListener('mouseup',onUp);
  cv.addEventListener('touchstart',onDown,{passive:false}); cv.addEventListener('touchmove',onMove,{passive:false}); cv.addEventListener('touchend',onUp,{passive:false});

  document.getElementById('again').addEventListener('click',reset);
  document.getElementById('rank').addEventListener('click',()=>{ try{ parent.postMessage({type:'dori-game',event:'open-leaderboard'},'*'); }catch(e){} });
  document.getElementById('mute').addEventListener('click',(e)=>{ e.stopPropagation(); if(!actx) startMusic(); toggleMute(); document.getElementById('mute').textContent=musicOn?'🔊':'🔇'; });
  window.addEventListener('resize',()=>{ layout(); buildWalls(); });

  // init
  engine=Engine.create(); world=engine.world; engine.gravity.y=1.1;
  layout(); buildWalls(); Events.on(engine,'collisionStart',onCollision);
  nextTier=pickTier(); newCurrent();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
